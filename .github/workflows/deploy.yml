name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: reprush-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    # Targets the dedicated RepRush runner on the Pi (labels set at registration).
    runs-on: [self-hosted, reprush]
    steps:
      - name: Deploy
        run: bash /var/www/reprush/scripts/deploy.sh
